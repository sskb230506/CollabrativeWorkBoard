version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: workboard-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: workboard
      POSTGRES_PASSWORD: workboard_secret
      POSTGRES_DB: collabrative_workboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workboard -d collabrative_workboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: workboard-redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
